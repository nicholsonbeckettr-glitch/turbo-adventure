<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>后台统计 · 保健成分匹配引擎</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23174d32'/%3E%3Cpath d='M32 12c9 8 15 16 15 25 0 8-6 14-15 14S17 45 17 37c0-9 6-17 15-25Z' fill='%23fffdf7'/%3E%3Cpath d='M32 22v20M23 33h18' stroke='%23174d32' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles/admin.css">
</head>
<body>
<main>
  <h1>后台统计</h1>
  <p class="muted">匿名统计访问、问卷完成、结果偏好和复制报告事件。</p>

  <section class="card">
    <h2>管理员验证</h2>
    <input id="token" type="password" placeholder="输入 Cloudflare 环境变量 ADMIN_TOKEN">
    <button id="load-stats">读取统计</button>
    <p id="msg" class="muted"></p>
  </section>

  <section id="dashboard" class="is-hidden">
    <div class="grid">
      <div class="card"><div class="muted">匿名用户</div><div id="users" class="metric">0</div></div>
      <div class="card"><div class="muted">事件总数</div><div id="events" class="metric">0</div></div>
      <div class="card"><div class="muted">完成匹配</div><div id="results" class="metric">0</div></div>
      <div class="card"><div class="muted">复制报告</div><div id="copies" class="metric">0</div></div>
      <div class="card"><div class="muted">下载报告</div><div id="downloads" class="metric">0</div></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>热门成分</h2>
        <div id="supplements"></div>
      </div>
      <div class="card">
        <h2>健康目标</h2>
        <div id="targets"></div>
      </div>
    </div>

    <div class="card">
      <h2>最近事件</h2>
      <table>
        <thead><tr><th>时间</th><th>事件</th><th>路径</th><th>偏好</th></tr></thead>
        <tbody id="recent"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="scripts/admin.js" defer></script>
</body>
</html>
