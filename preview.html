<style>

    --gold-light: #d4b67a;
    --vermillion: #c8403a;
  }

  body {
    background: var(--bg);
    color: #e8dcc8;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    margin: 0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: "Zhi Mang Xing", "STKaiti", "KaiTi", serif; }

  .card-glass {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 8px;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card-glass:hover {
    border-color: rgba(201,160,92,0.3);
    background: rgba(255,255,255,0.07);
  }

  .text-gold {
    background: linear-gradient(135deg, #c9a05c 0%, #e8c97a 50%, #c9a05c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .text-gold-flat { color: var(--gold); }

  @keyframes glow-rise {
    0% { opacity: 0; transform: translateY(0) scale(0.8); }
    50% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) scale(1.2); }
  }
  @keyframes ring-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes fade-in-up {
    0% { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes slide-in-left {
    0% { opacity: 0; transform: translateX(-16px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes scale-in {
    0% { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,160,92,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(201,160,92,0); }
  }
  .animate-glow-rise { animation: glow-rise 4s ease-in-out infinite; }
  .animate-ring-spin { animation: ring-spin 20s linear infinite; }
  .animate-fade-in-up { animation: fade-in-up 0.8s ease-out forwards; }
  .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
  .animate-slide-in-left { animation: slide-in-left 0.4s ease-out forwards; }
  .animate-scale-in { animation: scale-in 0.5s ease-out forwards; }
  .animate-pulse-gold { animation: pulse-gold 2s ease-in-out infinite; }

  .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(201,160,92,0.3);
    pointer-events: none;
  }

  .section { display: none; }
  .section.active { display: block; }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    margin-bottom: 48px;
  }
  .progress-fill {
    height: 100%;
    background: rgba(201,160,92,0.5);
    border-radius: 1px;
    transition: width 0.5s ease-out;
  }

    width: 100%;
    text-align: left;
    padding: 16px 20px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.04);

    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }

  .btn-secondary {

    background: transparent;

    text-align: center;
    max-width: 360px;

  { text: "你的浏览器标签页通常是？", opts: ["永远只开不超过 5 个", "几十个标签页同时存活", "用完就关，像禅修一样干净", "按主题分组，井井有条"] },
  { text: "面对一个新 App，你倾向于？", opts: ["先读完所有功能介绍再动手", "直接下载，边用边探索", "看一圈评价再决定", "分析它的技术栈和设计模式"] },
  { text: "你如何描述自己的社交能量？", opts: ["独处时充电，社交是消耗", "人群让我兴奋，越多人越嗨", "取决于对谁、在哪、什么时候", "我在网上比在现实中更活跃"] },
  { text: "当朋友向你倾诉烦恼时？", opts: ["提供具体可执行的解决方案", "先共情，再慢慢引导", "分享自己类似的经历", "推荐相关的文章/工具/资源"] },
  { text: "Deadline 前 24 小时，你是？", opts: ["早已完成，正在优化细节", "进入心流，效率爆表", "开始焦虑但勉强完成", "决定这个 deadline 不合理，要求延期"] },
  { text: "你的手机桌面是？", opts: ["只有系统自带应用，极致简洁", "按颜色分类，强迫症友好", "堆满各种效率工具和小部件", "乱中有序，只有自己找得到"] },
  { text: "AI 对你来说是什么？", opts: ["效率工具，帮我省时间", "创作伙伴，和我一起碰撞想法", "一个值得深入理解的黑箱", "算不上什么，我自己写模型"] },
  { text: "看到一条热门微博时，你是？", opts: ["先看评论区再决定态度", "转发前先独立查证事实", "顺手转发，跟着大家一起嗨", "默默围观，从不参与"] },
  { text: "你的密码管理方式是？", opts: ["三组密码轮换，全凭记忆", "密码管理器，每个网站独立随机", "能不改默认密码就不改", "全部不同，并且每周手动更换"] },
];

// ===== APP LOGIC =====
let currentQuestion = 0;
let answers = [];
const TOTAL_QUESTIONS = QUESTIONS.length;

function navigateTo(section) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  
  if (section === 'home') {
    document.getElementById('section-home').classList.add('active');
    currentQuestion = 0;
    answers = [];
  } else if (section === 'test') {
    document.getElementById('section-test').classList.add('active');
    currentQuestion = 0;
    answers = [];
    showQuestion();
  } else if (section === 'result') {
    document.getElementById('section-result').classList.add('active');
  }
  
  window.scrollTo(0, 0);
}

function scrollToTypes() {
  document.getElementById('types-section').scrollIntoView({ behavior: 'smooth' });
}

function showQuestion() {
  if (currentQuestion >= TOTAL_QUESTIONS) {
    showResult();
    return;
  }
  
  const q = QUESTIONS[currentQuestion];
  document.getElementById('q-number').textContent = `${currentQuestion + 1} / ${TOTAL_QUESTIONS}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(currentQuestion / TOTAL_QUESTIONS) * 100}%`;
  
  // re-trigger animation
  const qText = document.getElementById('q-text');
  qText.style.animation = 'none';
  qText.offsetHeight;
  qText.style.animation = 'fade-in-up 0.4s ease-out forwards';
  
  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('q-options').innerHTML = q.opts.map((opt, i) => 
    `<button class="test-option" onclick="selectAnswer(${i})">
      <span class="opt-letter">${letters[i]}</span>${opt}
    </button>`
  ).join('');
}

function selectAnswer(index) {
  answers.push(index);
  currentQuestion++;
  
  if (currentQuestion >= TOTAL_QUESTIONS) {
    document.getElementById('progress-fill').style.width = '100%';
    setTimeout(showResult, 300);
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('section-test').classList.remove('active');
  document.getElementById('section-result').classList.add('active');
  
  // Deterministic result based on all answers
  const hash = answers.reduce((acc, a, i) => acc + a * (i + 1) * 7 + a * 13, 0);
  const typeIndex = hash % PERSONALITY_TYPES.length;
  const result = PERSONALITY_TYPES[typeIndex];
  
  document.getElementById('r-emoji').textContent = result.emoji;
  document.getElementById('r-name').textContent = result.name;
  document.getElementById('r-tag').textContent = result.tag;
  document.getElementById('r-desc').textContent = result.desc;
  document.getElementById('r-advice').textContent = `"${result.advice}"`;
  
  window.scrollTo(0, 0);
}

function shareResult() {
  const name = document.getElementById('r-name').textContent;
  const emoji = document.getElementById('r-emoji').textContent;
  const tag = document.getElementById('r-tag').textContent;
  
  // Show share overlay
  document.getElementById('so-emoji').textContent = emoji;
  document.getElementById('so-name').textContent = name;
  document.getElementById('so-tag').textContent = tag;
  document.getElementById('share-overlay').classList.add('show');
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('show');
}

function copyShare() {
  const name = document.getElementById('r-name').textContent;
  const emoji = document.getElementById('r-emoji').textContent;
  const tag = document.getElementById('r-tag').textContent;
  const text = `${emoji} 我的赛博人格是：${name}（${tag}）\n来测测你的 👉`;
  
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('已复制分享文案到剪贴板！');
    });
  } else {
    alert(text);
  }
}

// ===== INIT =====
function init() {
  // Background particles
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle animate-glow-rise';
    p.style.left = `${8 + Math.random() * 84}%`;
    p.style.top = `${20 + Math.random() * 80}%`;
    p.style.animationDelay = `${Math.random() * 4}s`;
    p.style.animationDuration = `${3 + Math.random() * 5}s`;
    particlesContainer.appendChild(p);
  }
  
  // Type cards
  const typeGrid = document.getElementById('type-grid');
  PERSONALITY_TYPES.forEach(type => {
    const card = document.createElement('a');
    card.href = '#';
    card.className = 'card-glass';
    card.style.cssText = 'padding:20px;display:flex;align-items:flex-start;gap:16px;';
    card.onclick = (e) => { e.preventDefault(); navigateTo('test'); };
    card.innerHTML = `
      <span style="font-size:28px;flex-shrink:0;">${type.emoji}</span>
      <div style="min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h3 style="font-size:14px;margin:0;color:#e8dcc8;">${type.name}</h3>
          <span style="font-size:10px;padding:2px 6px;border-radius:9999px;background:rgba(201,160,92,0.1);border:1px solid rgba(201,160,92,0.2);color:rgba(201,160,92,0.7);">${type.tag}</span>
        </div>
        <p style="font-size:12px;color:rgba(232,220,200,0.35);margin:6px 0 0;line-height:1.6;">${type.desc}</p>
      </div>
    `;
    typeGrid.appendChild(card);
  });
  
  // Value prop cards
  const valueGrid = document.getElementById('value-grid');
  VALUE_PROPS.forEach(prop => {
    const card = document.createElement('div');
    card.className = 'card-glass';
    card.style.cssText = 'padding:24px;text-align:center;';
    card.innerHTML = `
      <span style="font-size:36px;">${prop.emoji}</span>
      <h3 style="font-size:14px;color:#e8dcc8;margin:12px 0 8px;">${prop.title}</h3>
      <p style="font-size:12px;color:rgba(232,220,200,0.35);line-height:1.6;">${prop.desc}</p>
    `;
    valueGrid.appendChild(card);
  });
  
  console.log('🧬 赛博人格测试已就绪 · 18 种人格 · 10 道题');
  console.log('   %cSBTI Cyber Personality Test', 'color: #c9a05c;');
}

init();
</script>
