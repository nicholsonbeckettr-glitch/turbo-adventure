<style>
:root {

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6;
}
h1,h2,h3{line-height:1.3}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;transition:all .2s;
}
.card:hover{border-color:var(--green);box-shadow:0 2px 12px rgba(26,86,50,.06)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 28px;border-radius:10px;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;border:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-outline{background:transparent;border:2px solid var(--green);color:var(--green)}
.btn-outline:active{background:var(--green-lt);transform:scale(.97)}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-lg{padding:14px 36px;font-size:16px}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:999px;font-size:10px;font-weight:600;
}
.badge-strong{background:#e8f5e9;color:#1b5e20}
.badge-moderate{background:#fff3e0;color:#e65100}
.badge-emerging{background:#e3f2fd;color:#1565c0}

.tag{
  display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;
  font-weight:500;
  border:1px solid var(--border);background:var(--card);color:var(--dim);
  -webkit-tap-highlight-color:transparent;
}

.section{display:none}
.section.on{display:block}

.warn{
  background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;
  padding:12px 16px;font-size:12px;color:#e65100;line-height:1.6;
}
.disclaimer{
  border-left:3px solid var(--green);background:var(--green-lt);
  border-radius:0 8px 8px 0;padding:12px 16px;font-size:11px;
  color:var(--dim);line-height:1.7;
}

.match-bar{
  height:6px;background:#e0e8e2;border-radius:3px;overflow:hidden;
}
.match-fill{
  height:100%;border-radius:3px;transition:width .6s ease;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim-fade{animation:fadeUp .4s ease-out forwards}

@media(max-width:640px){
  .hero-title{font-size:26px!important}
}
</style>

    opts:['没有，血压正常','偏高，在监测中','确诊高血压，在用药'],
    targets:[[],['血压偏高'],['血压偏高']]
  },
  {
    q:'您的消化系统状况？',
    opts:['很好，没有不适','偶尔腹胀/消化不良','经常便秘或腹泻','确诊IBS/IBD等消化疾病'],
    targets:[[],['消化问题'],['消化问题'],['消化问题']]
  },
  {
    q:'您的关节/骨骼状况？',
    opts:['很好，没有不适','偶尔酸痛','经常关节不适','确诊关节炎/骨质疏松等'],
    targets:[[],['关节炎症'],['关节炎症'],['关节炎症','骨质疏松风险']]
  },
  {
    q:'您的皮肤状况？',
    opts:['很好','偏干燥','有痤疮/痘痘困扰','有明显的皮肤老化/炎症'],
    targets:[[],['皮肤干燥'],['皮肤问题/痤疮'],['皮肤干燥']]
  },
  {
    q:'您的注意力/记忆力？',
    opts:['很好，思路清晰','偶尔脑雾/走神','经常注意力不集中','明显下降，影响工作'],
    targets:[[],['脑雾/认知'],['注意力不集中','脑雾/认知'],['记忆下降','脑雾/认知']]
  },
  {
    q:'您是否经常感到疲劳？',
    opts:['精力充沛','偶尔疲劳','经常疲劳','严重影响生活'],
    targets:[[],['疲劳感'],['疲劳感'],['疲劳感']]
  },
  {
    q:'您是否容易生病/感染？',
    opts:['很少生病','一年1-2次感冒','一年3次以上','免疫力明显偏低'],
    targets:[[],['免疫力低下'],['免疫力低下'],['免疫力低下']]
  },
  {
    q:'您是否有过敏问题？',
    opts:['没有','季节性过敏（花粉/尘螨）','食物过敏','药物或接触性过敏'],
    targets:[[],['过敏/季节性不适'],['消化问题'],['过敏/季节性不适']]
  },
];

// ==================== APP ENGINE ====================
const App = {
  qIdx:0, answers:[],
  go(section){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
    const map={home:'sec-home',quiz:'sec-quiz',result:'sec-result'};
    const el=document.getElementById(map[section]);
    if(el)el.classList.add('on');
    if(section==='quiz'){this.qIdx=0;this.answers=[];this.renderQ();}
    window.scrollTo(0,0);
  },
  
  renderQ(){
    if(this.qIdx>=QUIZ.length){this.showResult();return;}
    const q=QUIZ[this.qIdx];
    document.getElementById('quiz-q').textContent=q.q;
    document.getElementById('quiz-num').textContent=`${this.qIdx+1}/${QUIZ.length}`;
    document.getElementById('quiz-progress').style.width=`${(this.qIdx/QUIZ.length)*100}%`;
    
    const l=['A','B','C','D'];
    document.getElementById('quiz-opts').innerHTML=q.opts.map((o,i)=>
      `<button class="btn btn-outline anim-fade" style="width:100%;margin-bottom:10px;justify-content:flex-start;text-align:left;animation-delay:${i*.06}s" onclick="App.answer(${i})">
        <span style="color:var(--green);font-weight:600;margin-right:12px">${l[i]}</span>${o}
      </button>`
    ).join('');
  },
  
  answer(idx){
    this.answers.push(idx);
    this.qIdx++;
    if(this.qIdx>=QUIZ.length){
      document.getElementById('quiz-progress').style.width='100%';
      setTimeout(()=>this.showResult(),200);
    }else{this.renderQ();}
  },
  
  showResult(){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
    document.getElementById('sec-result').classList.add('on');
    
    const userTargets=new Set();
    const boostedIds=new Set();
    let onBpMeds=false;
    this.answers.forEach((a,i)=>{
      const q=QUIZ[i];
      (q.targets?.[a]||[]).forEach(t=>userTargets.add(t));
      (q.boosts?.[a]||[]).forEach(id=>boostedIds.add(id));
      if(q.id==='bp'&&a>=2)onBpMeds=true;
    });
    
    // Score supplements
    const scored=SUPPLEMENTS.map(s=>{
      let score=0;
      s.targets.forEach(t=>{if(userTargets.has(t))score++;});
      if(boostedIds.has(s.id))score++;
      const hasWarnings=onBpMeds&&s.warnings.some(w=>w.includes('降压'));
      return{...s,score,hasWarnings};
    });
    
    scored.sort((a,b)=>b.score-a.score);

    // Render top matches
    const top=scored.filter(s=>s.score>0).slice(0,12);
    const evidenceLabel={strong:'强证据',moderate:'中等证据',emerging:'新兴研究'};
    const evidenceClass={strong:'badge-strong',moderate:'badge-moderate',emerging:'badge-emerging'};
    const fillColors=['var(--green)','var(--teal)','var(--gold)','#5a7d6a','#8d6e63'];
    
    const maxScore=Math.max(...top.map(s=>s.score),1);
    
    document.getElementById('result-list').innerHTML=top.map((s,i)=>{
      const pct=Math.round((s.score/maxScore)*100);
      return `<div class="card anim-fade" style="padding:18px;margin-bottom:12px;animation-delay:${i*.06}s">
        <div style="display:flex;align-items:flex-start;gap:14px">
          <span style="font-size:30px;flex-shrink:0">${s.emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <h3 style="font-size:15px;font-weight:600">${s.name}</h3>
              <span class="badge ${evidenceClass[s.evidence]}">${evidenceLabel[s.evidence]}</span>
              ${s.hasWarnings?'<span style="font-size:10px;color:var(--red);font-weight:500">⚠ 需要评估</span>':''}
            </div>
            <p style="font-size:12px;color:var(--dim);margin-bottom:8px;line-height:1.6">${s.desc}</p>
            <div class="match-bar" style="margin-bottom:6px"><div class="match-fill" style="width:${pct}%;background:${fillColors[i%fillColors.length]}"></div></div>
            <div style="font-size:11px;color:var(--dim);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">
              <span>匹配度: ${pct}%</span>
              <span>💊 ${s.dosage}</span>
            </div>
            ${s.refs.length?`<p style="font-size:10px;color:var(--dim);margin-top:4px;font-style:italic">📚 ${s.refs[0].t} (${s.refs[0].j}, ${s.refs[0].y})</p>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    
    if(top.length===0){
      document.getElementById('result-list').innerHTML='<div class="card" style="padding:24px;text-align:center"><p style="color:var(--dim);font-size:14px">基于您的回答，暂未发现需要特别关注的健康领域。保持当前生活方式！</p></div>';
    }
    
    window.scrollTo(0,0);
  }
};

// ==================== INIT ====================
(function(){
  // Supplement preview pills
  document.getElementById('supp-preview').innerHTML=SUPPLEMENTS.map(s=>
    `<span class="tag">${s.emoji} ${s.name}</span>`
  ).join('');
  
  console.log('%c🧬 保健成分匹配引擎 %c已就绪','color:#1a5632;font-size:16px','');
  console.log(`%c  ${SUPPLEMENTS.length}种成分 · ${QUIZ.length}道问卷题 · 循证推荐`,'color:#5a7d6a');
})();
</script>
